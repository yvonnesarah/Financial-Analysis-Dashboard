<!DOCTYPE html>
<html lang="en-gb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Analysis Dashboard</title>

  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<div class="container">
  <h1>📊 Financial Dashboard</h1>

  <!-- Controls -->
  <div class="controls">

    <select id="yearFilter"></select>

    <input id="searchBox" placeholder="Search month (e.g. Jan)" />

    <select id="chartType">
      <option value="line">Line Chart</option>
      <option value="bar">Bar Chart</option>
    </select>

    <button id="sortBtn">Sort ↕</button>
    <button id="exportBtn">Export CSV</button>
    <button id="exportJsonBtn">Export JSON</button>
    <button id="themeToggle">🌙 Theme</button>

  </div>

  <!-- Dashboard -->
  <div class="dashboard">

    <div class="card">
      <span class="label">Total Months</span>
      <span id="months" class="value"></span>
    </div>

    <div class="card">
      <span class="label">Net Total</span>
      <span id="total" class="value"></span>
    </div>

    <div class="card">
      <span class="label">Average Change</span>
      <span id="average" class="value"></span>
    </div>

    <div class="card">
      <span class="label">Best Month</span>
      <span id="bestMonth" class="value"></span>
    </div>

    <div class="card">
      <span class="label">Worst Month</span>
      <span id="worstMonth" class="value"></span>
    </div>

    <div class="card">
      <span class="label">AI Insights</span>
      <div id="insights"></div>
    </div>

  </div>

  <canvas id="chart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="assets/js/script.js"></script>

</body>
</html>
