<!DOCTYPE html>
<html lang="en-gb">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Financial Analysis Dashboard</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

<div class="container">
  <h1>📊 Financial Analysis</h1>

  <!-- Controls -->
  <div class="controls">
    <select id="yearFilter">
      <option value="all">All Years</option>
    </select>

    <button id="exportBtn">Export CSV</button>
    <button id="themeToggle">🌙 Toggle Theme</button>
  </div>

  <!-- KPI Cards -->
  <div class="card"><span class="label">Total Months:</span><span id="months"></span></div>
  <div class="card"><span class="label">Net Total:</span><span id="total"></span></div>
  <div class="card"><span class="label">Average Change:</span><span id="average"></span></div>
  <div class="card"><span class="label">Best Month:</span><span id="bestMonth"></span></div>
  <div class="card"><span class="label">Worst Month:</span><span id="worstMonth"></span></div>

  <!-- AI Insights -->
  <div class="card">
    <span class="label">AI Insights:</span>
    <div id="insights"></div>
  </div>

  <!-- Chart -->
  <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="assets/js/script.js"></script>

</body>
</html>
